<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDesk Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <a href="/"><img src="assets/images/logo.png" alt="" style="width: 150px; margin-bottom: 15px; border-radius: 5px; background: #ffffff;"></a>
            <p>Login to your dashboard</p>

            <form id="loginForm">

                <div class="input-box">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box" style="margin-bottom: 0;">
                    <input type="password" id="password" required>
                    <label>Password</label>
                </div>

                <p class="error" id="errorMsg"></p>

                <button type="submit">Login</button>
                <div class="signup-text">
                    Don’t have an account? <a href="signup.html">Sign up</a>
                </div>

            </form>

        </div>

    </div>

    <script>
        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");
        const card = document.getElementById("loginCard");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Dummy credentials
            if (email === "admin@agrisense.com" && password === "123456") {
                errorMsg.style.color = "#22c55e";
                errorMsg.innerText = "Login successful!";
            } else {
                errorMsg.innerText = "Invalid credentials";
                form.reset();

                // Shake animation
                card.classList.add("shake");
                setTimeout(() => card.classList.remove("shake"), 300);
            }
        });

        /* PASSWORD TOGGLE */
        function togglePassword() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
